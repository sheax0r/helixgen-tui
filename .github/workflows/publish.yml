# Publish the helixgen-tui package to PyPI via OIDC trusted publishing.
#
# Fires on v* tags (e.g. v0.1.0). The PyPI side must have a (pending)
# trusted publisher registered for project "helixgen-tui" pointing at this
# repo + this workflow filename + environment "pypi" — no API token is
# stored anywhere. Mirrors helixgen-core's publish workflow.

name: Publish to PyPI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches pyproject version
        if: github.ref_type == 'tag'
        run: |
          ver=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$ver" != "$tag" ]; then
            echo "::error::tag v$tag does not match pyproject version $ver"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
