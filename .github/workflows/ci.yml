# Run lint + the test suite on every PR and on pushes to main.
#
# Mirrors helixgen-core's CI conventions (setup-python 3.12, pip install -e,
# python -m pytest -q); ruff is this repo's linter.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: python -m pip install ruff

      - name: Ruff lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package + dev extras
        run: python -m pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest -q
